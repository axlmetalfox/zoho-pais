<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>País y Ciudad - Zoho CRM Widget</title>

  <!-- Zoho CRM JS SDK -->
  <script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f7f8fc;
      --surface:   #ffffff;
      --border:    #e2e6ef;
      --accent:    #2563eb;
      --accent-lt: #eff4ff;
      --text:      #1e2330;
      --muted:     #6b7590;
      --success:   #16a34a;
      --error:     #dc2626;
      --radius:    10px;
      --shadow:    0 2px 12px rgba(37,99,235,.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Header ─────────────────────────────────────── */
    .widget-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .widget-header .icon {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 16px;
      flex-shrink: 0;
    }
    .widget-header h1 {
      font-size: 15px; font-weight: 600; color: var(--text);
      letter-spacing: -.2px;
    }
    .widget-header p {
      font-size: 12px; color: var(--muted); margin-top: 1px;
    }

    /* ── Card ────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    /* ── Grid ────────────────────────────────────────── */
    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* ── Field group ─────────────────────────────────── */
    .field-group { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    .select-wrapper {
      position: relative;
    }
    .select-wrapper::after {
      content: "▾";
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 12px;
    }

    select {
      width: 100%;
      appearance: none;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 9px 36px 9px 13px;
      font-family: inherit;
      font-size: 13.5px;
      color: var(--text);
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, background .2s;
      outline: none;
    }
    select:hover { border-color: #a9bcf5; }
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      background: var(--surface);
    }
    select:disabled {
      color: #b0b8cc;
      cursor: not-allowed;
      background: #f0f2f8;
    }
    select option { color: var(--text); }

    /* ── Search input ────────────────────────────────── */
    .search-input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 8px 8px 0 0;
      border-bottom: none;
      padding: 8px 13px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      display: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input.visible { display: block; }

    /* ── Loader ──────────────────────────────────────── */
    .loader {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      color: var(--muted);
      padding: 4px 0;
    }
    .loader.visible { display: flex; }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Save button ─────────────────────────────────── */
    .btn-row {
      margin-top: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .btn {
      padding: 9px 22px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .2s;
      display: flex; align-items: center; gap: 7px;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(37,99,235,.25);
    }
    .btn-primary:hover { background: #1d4ed8; box-shadow: 0 4px 14px rgba(37,99,235,.35); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; box-shadow: none; transform: none; }

    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover { background: var(--bg); color: var(--text); }

    /* ── Status toast ────────────────────────────────── */
    .status {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 7px;
      animation: fadeIn .3s ease;
    }
    .status.visible { display: flex; }
    .status.success { background: #dcfce7; color: var(--success); border: 1px solid #bbf7d0; }
    .status.error   { background: #fee2e2; color: var(--error);   border: 1px solid #fecaca; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

    /* ── Field preview ───────────────────────────────── */
    .preview-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .badge {
      display: none;
      align-items: center;
      gap: 5px;
      background: var(--accent-lt);
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #bfdbfe;
    }
    .badge.visible { display: flex; }
    .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="widget-header">
    <div class="icon">🌎</div>
    <div>
      <h1>Selector de País y Ciudad</h1>
      <p>Datos actualizados desde CountriesNow API</p>
    </div>
  </div>

  <!-- Main card -->
  <div class="card">
    <div class="fields-grid">

      <!-- País -->
      <div class="field-group">
        <label>🌍 País</label>
        <div id="country-loader" class="loader">
          <div class="spinner"></div> Cargando países...
        </div>
        <div class="select-wrapper" id="country-wrapper" style="display:none">
          <select id="country-select">
            <option value="">— Selecciona un país —</option>
          </select>
        </div>
      </div>

      <!-- Ciudad -->
      <div class="field-group">
        <label>🏙️ Ciudad</label>
        <div id="city-loader" class="loader">
          <div class="spinner"></div> Cargando ciudades...
        </div>
        <div class="select-wrapper" id="city-wrapper" style="display:none">
          <select id="city-select" disabled>
            <option value="">— Selecciona primero un país —</option>
          </select>
        </div>
      </div>

    </div>

    <!-- Badges de selección actual -->
    <div class="preview-row">
      <div class="badge" id="badge-country">
        <span class="dot"></span>
        <span id="badge-country-txt"></span>
      </div>
      <div class="badge" id="badge-city">
        <span class="dot"></span>
        <span id="badge-city-txt"></span>
      </div>
    </div>

    <!-- Botones -->
    <div class="btn-row">
      <div class="status" id="status-msg"></div>
      <div style="display:flex; gap:10px; margin-left:auto">
        <button class="btn btn-secondary" id="btn-clear">✕ Limpiar</button>
        <button class="btn btn-primary" id="btn-save" disabled>
          💾 Guardar en CRM
        </button>
      </div>
    </div>
  </div>

  <script>
  /* ═══════════════════════════════════════════════════════
     CONFIGURACIÓN — Ajusta los nombres de campo de tu CRM
  ══════════════════════════════════════════════════════════ */
  const CRM_FIELD_COUNTRY = "Country";          // API name del campo País en tu módulo
  const CRM_FIELD_CITY    = "City";        // API name del campo Ciudad en tu módulo
  const API_BASE          = "https://countriesnow.space/api/v0.1";

  /* ═══════════════════════════════════════════════════════
     ESTADO
  ══════════════════════════════════════════════════════════ */
  let selectedCountry = "";
  let selectedCity    = "";
  let currentRecordId = null;
  let currentModule   = null;

  /* ═══════════════════════════════════════════════════════
     ELEMENTOS DOM
  ══════════════════════════════════════════════════════════ */
  const countrySelect  = document.getElementById("country-select");
  const citySelect     = document.getElementById("city-select");
  const countryLoader  = document.getElementById("country-loader");
  const cityLoader     = document.getElementById("city-loader");
  const countryWrapper = document.getElementById("country-wrapper");
  const cityWrapper    = document.getElementById("city-wrapper");
  const btnSave        = document.getElementById("btn-save");
  const btnClear       = document.getElementById("btn-clear");
  const statusMsg      = document.getElementById("status-msg");
  const badgeCountry   = document.getElementById("badge-country");
  const badgeCity      = document.getElementById("badge-city");
  const badgeCountryTxt= document.getElementById("badge-country-txt");
  const badgeCityTxt   = document.getElementById("badge-city-txt");

  /* ═══════════════════════════════════════════════════════
     UTILIDADES
  ══════════════════════════════════════════════════════════ */
  function showStatus(msg, type = "success", autohide = true) {
    statusMsg.textContent = (type === "success" ? "✔ " : "✖ ") + msg;
    statusMsg.className = `status visible ${type}`;
    if (autohide) setTimeout(() => statusMsg.className = "status", 4000);
  }

  function updateBadges() {
    if (selectedCountry) {
      badgeCountryTxt.textContent = selectedCountry;
      badgeCountry.classList.add("visible");
    } else {
      badgeCountry.classList.remove("visible");
    }
    if (selectedCity) {
      badgeCityTxt.textContent = selectedCity;
      badgeCity.classList.add("visible");
    } else {
      badgeCity.classList.remove("visible");
    }
    btnSave.disabled = !(selectedCountry && selectedCity);
  }

  /* ═══════════════════════════════════════════════════════
     CARGA DE PAÍSES
  ══════════════════════════════════════════════════════════ */
  async function loadCountries() {
    countryLoader.classList.add("visible");
    countryWrapper.style.display = "none";
    try {
      const res  = await fetch(`${API_BASE}/countries`);
      const json = await res.json();
      if (json.error) throw new Error(json.msg);

      const countries = json.data.sort((a, b) =>
        a.country.localeCompare(b.country)
      );

      countrySelect.innerHTML = `<option value="">— Selecciona un país —</option>`;
      countries.forEach(({ country }) => {
        const opt = document.createElement("option");
        opt.value = country;
        opt.textContent = country;
        countrySelect.appendChild(opt);
      });

      countryLoader.classList.remove("visible");
      countryWrapper.style.display = "block";
    } catch (err) {
      countryLoader.classList.remove("visible");
      showStatus("Error cargando países: " + err.message, "error", false);
    }
  }

  /* ═══════════════════════════════════════════════════════
     CARGA DE CIUDADES
  ══════════════════════════════════════════════════════════ */
  async function loadCities(country) {
    citySelect.disabled = true;
    cityLoader.classList.add("visible");
    cityWrapper.style.display = "none";
    citySelect.innerHTML = `<option value="">Cargando ciudades...</option>`;

    try {
      const res  = await fetch(`${API_BASE}/countries/cities`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ country })
      });
      const json = await res.json();
      if (json.error) throw new Error(json.msg);

      const cities = json.data.sort();
      citySelect.innerHTML = `<option value="">— Selecciona una ciudad —</option>`;
      cities.forEach(city => {
        const opt = document.createElement("option");
        opt.value = city;
        opt.textContent = city;
        citySelect.appendChild(opt);
      });

      cityLoader.classList.remove("visible");
      cityWrapper.style.display = "block";
      citySelect.disabled = false;
    } catch (err) {
      cityLoader.classList.remove("visible");
      cityWrapper.style.display = "block";
      citySelect.innerHTML = `<option value="">Error cargando ciudades</option>`;
      showStatus("Error cargando ciudades: " + err.message, "error");
    }
  }

  /* ═══════════════════════════════════════════════════════
     GUARDAR EN ZOHO CRM
  ══════════════════════════════════════════════════════════ */
  async function saveToZohoCRM() {
    if (!selectedCountry || !selectedCity) return;
    btnSave.disabled = true;
    btnSave.textContent = "Guardando...";

    try {
      // Actualizar campos en la vista del registro (UI)
      await ZOHO.CRM.UI.Record.set({
        [CRM_FIELD_COUNTRY]: selectedCountry,
        [CRM_FIELD_CITY]:    selectedCity
      });

      // Persistir en la base de datos de Zoho CRM via API
      if (currentRecordId && currentModule) {
        await ZOHO.CRM.API.updateRecord({
          Entity:    currentModule,
          APIData: {
            id:                    currentRecordId,
            [CRM_FIELD_COUNTRY]:   selectedCountry,
            [CRM_FIELD_CITY]:      selectedCity
          }
        });
      }

      showStatus(`${selectedCountry} / ${selectedCity} guardado correctamente`);
    } catch (err) {
      showStatus("Error al guardar: " + err.message, "error");
    } finally {
      btnSave.disabled = false;
      btnSave.innerHTML = "💾 Guardar en CRM";
    }
  }

  /* ═══════════════════════════════════════════════════════
     LIMPIAR SELECCIÓN
  ══════════════════════════════════════════════════════════ */
  function clearSelection() {
    countrySelect.value = "";
    citySelect.value    = "";
    citySelect.disabled = true;
    citySelect.innerHTML = `<option value="">— Selecciona primero un país —</option>`;
    selectedCountry = "";
    selectedCity    = "";
    updateBadges();
    statusMsg.className = "status";
  }

  /* ═══════════════════════════════════════════════════════
     EVENTOS
  ══════════════════════════════════════════════════════════ */
  countrySelect.addEventListener("change", async (e) => {
    selectedCountry = e.target.value;
    selectedCity    = "";
    updateBadges();

    if (selectedCountry) {
      await loadCities(selectedCountry);
    } else {
      citySelect.disabled = true;
      citySelect.innerHTML = `<option value="">— Selecciona primero un país —</option>`;
      cityWrapper.style.display = "block";
    }
  });

  citySelect.addEventListener("change", (e) => {
    selectedCity = e.target.value;
    updateBadges();
  });

  btnSave.addEventListener("click",  saveToZohoCRM);
  btnClear.addEventListener("click", clearSelection);

  /* ═══════════════════════════════════════════════════════
     INIT — Zoho SDK
  ══════════════════════════════════════════════════════════ */
  ZOHO.embeddedApp.on("PageLoad", async (pageData) => {
    // Guardar contexto del registro actual
    if (pageData && pageData.EntityId) {
      currentRecordId = pageData.EntityId;
      currentModule   = pageData.Entity;

      // Leer valores existentes del registro
      try {
        const records = await ZOHO.CRM.API.getRecord({
          Entity: currentModule,
          RecordID: currentRecordId
        });
        const record = records?.data?.[0];
        if (record) {
          if (record[CRM_FIELD_COUNTRY]) {
            selectedCountry = record[CRM_FIELD_COUNTRY];
          }
          if (record[CRM_FIELD_CITY]) {
            selectedCity = record[CRM_FIELD_CITY];
          }
        }
      } catch (e) {
        // Sin registro previo — continuar normalmente
      }
    }

    // Cargar países
    await loadCountries();

    // Restaurar valores previos si existen
    if (selectedCountry) {
      countrySelect.value = selectedCountry;
      await loadCities(selectedCountry);
      if (selectedCity) {
        citySelect.value = selectedCity;
        updateBadges();
      }
    }
  });

  ZOHO.embeddedApp.init();
  </script>
</body>
</html>
